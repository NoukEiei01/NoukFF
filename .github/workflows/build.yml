name: Build & Release VPN APK

on:
  push:
    branches: [ main, master, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

env:
  JAVA_VERSION: '17'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Build Debug APK
  # ─────────────────────────────────────────────
  build-debug:
    name: 🔨 Build Debug APK
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'debug') ||
      (github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/'))
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: Grant Gradle execute permission
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: vpn-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      - name: Print APK info
        run: |
          APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          echo "✅ Debug APK: $APK"
          echo "📦 Size: $(du -sh "$APK" | cut -f1)"

  # ─────────────────────────────────────────────
  # Job 2: Build & Sign Release APK
  # ─────────────────────────────────────────────
  build-release:
    name: 🚀 Build & Sign Release APK
    runs-on: ubuntu-latest
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'release')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: Grant Gradle execute permission
        run: chmod +x gradlew

      - name: Decode Keystore (if secret exists)
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > app/keystore.jks
            echo "✅ Keystore decoded"
          else
            echo "⚠️ No KEYSTORE_BASE64 secret — building unsigned APK"
          fi
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Build Release APK
        env:
          KEYSTORE_FILE: keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Print APK info
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "✅ Release APK: $APK"
          echo "📦 Size: $(du -sh "$APK" | cut -f1)"

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: vpn-release-${{ github.sha }}
          path: app/build/outputs/apk/release/
          retention-days: 30

  # ─────────────────────────────────────────────
  # Job 3: Create GitHub Release on tag push
  # ─────────────────────────────────────────────
  release:
    name: 📦 GitHub Release
    runs-on: ubuntu-latest
    needs: build-release
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Release APK
        uses: actions/download-artifact@v4
        with:
          name: vpn-release-${{ github.sha }}
          path: release-apk/

      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: "VPN App ${{ env.VERSION }}"
          body: |
            ## 🛡️ VPN App ${{ env.VERSION }}

            ### Features
            - Android VPN (Non-root, uses Android VpnService)
            - Floating overlay widget (drag anywhere on screen)
            - Multi-server with ping & load display
            - Auto-connect on boot
            - Kill switch support

            ### Installation
            1. Download `app-release.apk` below
            2. On Android: **Settings → Install unknown apps** → allow
            3. Install APK and open the app
            4. Grant VPN permission and Overlay permission when prompted

            ### Requirements
            - Android 6.0+ (API 23)
            - No root required
          files: release-apk/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
