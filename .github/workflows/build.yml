name: Build & Release VPN APK

on:
  push:
    branches: [ main, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (debug/release)'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

env:
  JAVA_VERSION: '17'
  ANDROID_API_LEVEL: '34'

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Run unit tests
  # ─────────────────────────────────────────────
  test:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: Grant Gradle execute permission
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew test --stacktrace

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: app/build/reports/tests/

  # ─────────────────────────────────────────────
  # Job 2: Build Debug APK
  # ─────────────────────────────────────────────
  build-debug:
    name: 🔨 Build Debug APK
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'debug')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: Grant Gradle execute permission
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: vpn-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

  # ─────────────────────────────────────────────
  # Job 3: Build & Sign Release APK
  # ─────────────────────────────────────────────
  build-release:
    name: 🚀 Build & Sign Release APK
    runs-on: ubuntu-latest
    needs: test
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'release') ||
      (github.ref == 'refs/heads/main' && github.event_name == 'push')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: Grant Gradle execute permission
        run: chmod +x gradlew

      # Decode keystore from base64 secret
      - name: Decode Keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/keystore.jks
          echo "Keystore decoded successfully"

      - name: Build Release APK
        env:
          KEYSTORE_FILE: keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease --stacktrace

      - name: Verify APK signature
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "APK path: $APK_PATH"
          $ANDROID_HOME/build-tools/34.0.0/apksigner verify --verbose "$APK_PATH"

      - name: Get APK info
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV
          APK_SIZE=$(du -sh "$APK_PATH" | cut -f1)
          echo "APK_SIZE=$APK_SIZE" >> $GITHUB_ENV
          echo "Build complete - Size: $APK_SIZE"

      - name: Upload Release APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vpn-release-${{ github.sha }}
          path: app/build/outputs/apk/release/
          retention-days: 30

  # ─────────────────────────────────────────────
  # Job 4: Create GitHub Release (on tag push)
  # ─────────────────────────────────────────────
  release:
    name: 📦 GitHub Release
    runs-on: ubuntu-latest
    needs: build-release
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Release APK
        uses: actions/download-artifact@v4
        with:
          name: vpn-release-${{ github.sha }}
          path: release-apk/

      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.VERSION }}
          name: "VPN App ${{ env.VERSION }}"
          body: |
            ## VPN App ${{ env.VERSION }}

            ### What's included
            - Android VPN App (Non-root)
            - Floating overlay widget
            - Multi-server support
            - Kill switch
            - Auto-connect on boot

            ### Installation
            1. Download `app-release.apk`
            2. Enable "Install from unknown sources" on your Android device
            3. Install the APK
            4. Grant VPN & overlay permissions when prompted

            ### Requirements
            - Android 6.0 (API 23) or higher
            - No root required

          files: |
            release-apk/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────
  # Job 5: Code quality check
  # ─────────────────────────────────────────────
  lint:
    name: 🔍 Lint Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle
      - run: chmod +x gradlew
      - name: Run Lint
        run: ./gradlew lint
      - name: Upload Lint Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-results
          path: app/build/reports/lint-results*.html
